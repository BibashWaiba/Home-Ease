{% extends 'base.html' %}

{% block title %}Contact Us — Home Ease{% endblock %}

{% block content %}
<section class="page-header" style="margin-top: 70px; text-align: center; padding: 60px 20px; background-color: #f9f9f9; border-bottom: 1px solid #eee;">
  <div class="page-header-inner">
    <h1 style="margin-bottom: 10px; font-size: 2.5rem; color: #333;">Contact Us</h1>
    <p style="color: #666; font-size: 1.1rem;">We'd love to hear from you</p>
  </div>
</section>

<section class="contact-content" style="padding: 60px 20px;">
  <div class="contact-inner" style="max-width: 600px; margin: 0 auto;">

    {% if messages %}
      <div class="messages" style="margin-bottom: 20px;">
        <style>
          .alert { padding: 15px; border-radius: 6px; margin-bottom: 15px; }
          .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
          .alert-error, .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        </style>
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form class="contact-form" action="{% url 'contact_us' %}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
      {% csrf_token %}
      <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
        <label for="name" style="font-weight: 600; color: #333;">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; width: 100%;">
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
        <label for="email" style="font-weight: 600; color: #333;">Email</label>
        <input type="email" id="email" name="email" placeholder="Your Email Address" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; width: 100%;">
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
        <label for="subject" style="font-weight: 600; color: #333;">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What is this about?" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; width: 100%;">
      </div>

      <div class="form-group" style="display: flex; flex-direction: column; gap: 5px;">
        <label for="message" style="font-weight: 600; color: #333;">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; width: 100%; resize: vertical;"></textarea>
      </div>

      <button type="submit" style="padding: 14px 24px; background-color: #2563eb; color: white; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 1.05rem; transition: background-color 0.3s ease;">Send Message</button>
    </form>
  </div>
</section>
{% endblock %}

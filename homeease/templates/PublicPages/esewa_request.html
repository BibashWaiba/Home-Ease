{% extends 'base.html' %}
{% block title %}Redirecting to eSewa — Home Ease{% endblock %}
{% block content %}
<section style="min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f9f9f9; text-align: center; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%;">
        <img src="https://esewa.com.np/common/images/esewa-logo.png" alt="eSewa Logo" style="width: 180px; margin-bottom: 25px;">
        <h2 style="color: #333; margin-bottom: 15px; font-size: 1.8rem;">Redirecting to Secure Gateway...</h2>
        <p style="color: #666; font-size: 1.1rem; margin-bottom: 30px;">Please do not refresh or close this page while we transfer you to eSewa to complete your payment of <strong>Rs. {{ amount }}</strong>.</p>
        
        <div class="loader" style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #60bb46; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
    </div>

    <form id="esewaForm" action="https://rc-epay.esewa.com.np/api/epay/main/v2/form" method="POST" style="display: none;">
        <input type="hidden" name="amount" value="{{ amount }}" required>
        <input type="hidden" name="tax_amount" value="{{ tax_amount }}" required>
        <input type="hidden" name="total_amount" value="{{ total_amount }}" required>
        <input type="hidden" name="transaction_uuid" value="{{ transaction_uuid }}" required>
        <input type="hidden" name="product_code" value="{{ product_code }}" required>
        <input type="hidden" name="product_service_charge" value="0" required>
        <input type="hidden" name="product_delivery_charge" value="0" required>
        <input type="hidden" name="success_url" value="{{ success_url }}" required>
        <input type="hidden" name="failure_url" value="{{ failure_url }}" required>
        <input type="hidden" name="signed_field_names" value="{{ signed_field_names }}" required>
        <input type="hidden" name="signature" value="{{ signature }}" required>
        <button type="submit">Submit</button>
    </form>
</section>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
    // Auto submit to eSewa after 1.5 seconds for UX
    setTimeout(function() {
        document.getElementById("esewaForm").submit();
    }, 1500);
</script>
{% endblock %}

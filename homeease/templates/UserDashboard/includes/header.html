<header class="header">
  <div class="header-left" style="display: flex; flex-direction: column;">
    <span style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted);">Welcome back,</span>
    <h1 class="header-title" style="margin-top: -4px;">{{ user.first_name|default:user.username }}</h1>
  </div>

  <div class="header-right" style="display: flex; align-items: center; gap: 24px;">

    <div class="user-meta" style="display: flex; align-items: center; gap: 12px;">
      <div style="text-align: right;">
        <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-main);">{{ user.username }}</div>
      </div>
      <div class="avatar"
        style="width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #6366f1, #2563eb); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);">
        {{ user.username|make_list|first|upper }}
      </div>
    </div>
  </div>
</header>

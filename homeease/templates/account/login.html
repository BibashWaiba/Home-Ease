{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'assets/css/account/login.css' %}" />
</head>
<body>
<div class="body">
  <div class="login-main">
    <!-- Left Image -->
    <div class="login-image">
      <p class="login-image-text">Welcome Back!  Ready to Continue? </p>
    </div>

    <!-- Right Form -->
    <div class="login-form-container">
      <h2>Login</h2>
      <p class="login-subtitle">Enter your credentials to access your account</p>
      
      <!-- Display Messages -->
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
      
      <form method="POST">
        {% csrf_token %}
        
        <!-- Username -->
        <div class="form-group">
          <label for="username">Username <span style="color: #e74c3c;">*</span></label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
            required 
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password <span style="color: #e74c3c;">*</span></label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required 
          />
        </div>
        <!-- Submit Button -->
        <button type="submit" class="login-btn">Login</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>OR</span>
      </div>

      <!-- Register Redirect -->
      <div class="register-redirect">
        Don't have an account? <a href="/register">Register here</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>

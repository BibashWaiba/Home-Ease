{% extends 'AdminDashboard/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="admin-form" style="margin: 0 auto; text-align: center;">
  <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #c62828; margin-bottom: 20px;"></i>
  <h2 style="margin-bottom: 15px; color: var(--text);">Are you sure?</h2>
  <p style="margin-bottom: 30px; color: var(--muted);">Are you sure you want to delete this User? This action cannot be undone.</p>
  <form method="post" style="display: flex; gap: 15px; justify-content: center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary" style="padding: 12px 30px; background: #c62828; color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 1rem;">Yes, Delete</button>
    <a href="{% url 'admin_users_list' %}" class="btn" style="padding: 12px 30px; background: var(--light2); color: var(--text); border: none; border-radius: var(--radius-sm); text-decoration: none; font-size: 1rem;">Cancel</a>
  </form>
</div>
{% endblock %}

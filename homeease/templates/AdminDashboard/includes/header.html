<div class="topbar">
  <div class="header-info">
    <h1>{{ page_title|default:"Welcome back, Admin" }}</h1>
    <p>{{ page_subtitle|default:"Manage your platform's services and users effortlessly." }}</p>
  </div>

  <div class="actions" style="display: flex; align-items: center; gap: 16px;">

    <a href="{% url 'home' %}" class="btn btn-ghost" style="display: flex; align-items: center; gap: 8px;">
      <i class="fas fa-eye"></i> View Site
    </a>

    <a href="{% url 'admin_bookings_list' %}" class="btn btn-primary"
      style="display: flex; align-items: center; gap: 8px;">
      <i class="fas fa-calendar-plus"></i> Manage Bookings
    </a>

    <div class="user-profile-circle"
      style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; position: relative;"
      title="{{ user.username }}">
      {{ user.username|make_list|first|upper }}
    </div>
  </div>
</div>
